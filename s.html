<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyothi | Full Stack Developer</title>
  





</head>

<style>

body {
    margin: 0;
    background: black;
    overflow: hidden;
}
</style>

<body>

<canvas id="canvas"></canvas>






<script> const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// Draw text first
ctx.fillStyle = "white";
ctx.font = "bold 120px Poppins";
ctx.textAlign = "center";
ctx.fillText("JYOTHI", canvas.width / 2, canvas.height / 2);

// Get pixel data of text
const textData = ctx.getImageData(0, 0, canvas.width, canvas.height);

// Convert pixels → particles
for (let y = 0; y < canvas.height; y += 4) {
    for (let x = 0; x < canvas.width; x += 4) {
        const index = (y * canvas.width + x) * 4;
        if (textData.data[index + 3] > 128) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                tx: x,
                ty: y,
                size: 2
            });
        }
    }
}

// Clear text
ctx.clearRect(0, 0, canvas.width, canvas.height);

// Animate particles forming text
function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        // move towards target (text position)
        p.x += (p.tx - p.x) * 0.05;
        p.y += (p.ty - p.y) * 0.05;

        ctx.fillStyle = "#00f0ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();</script>
</body>

</html>
